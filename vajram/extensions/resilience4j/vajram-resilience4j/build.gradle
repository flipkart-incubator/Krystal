description = "Resilience4j extension for Krystal - Facilitates using Resilience4j to implement circuit breakers and bulkheads around vajram invocations"

dependencies {
    implementation project(':krystal-common')
    implementation project(':krystex')
    implementation 'io.github.resilience4j:resilience4j-all'
    implementation 'io.github.resilience4j:resilience4j-bulkhead'
    implementation 'io.github.resilience4j:resilience4j-circuitbreaker'

    testImplementation testFixtures(project(':krystex'))
}