description = 'Codegen module for enabling support for JSON in Krystal'

dependencies {
    implementation project(':krystal-codegen-common')
    implementation project(':vajram:vajram-codegen-common')
    implementation project(':krystal-common')
    implementation project(':krystal-common')
    implementation project(':vajram:extensions:json:vajram-json')

    implementation 'com.squareup:javapoet'
    implementation 'com.fasterxml.jackson.core:jackson-annotations'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
}

checkerFramework {
    extraJavacArgs += ['-AresolveReflection',]
}