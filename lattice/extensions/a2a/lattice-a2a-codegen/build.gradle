description = "Code Generator for generating A2A specific code for Quarkus-A2A backed Lattice Apps"

dependencies {
    implementation project(':krystal-codegen-common')
    implementation project(':lattice:lattice-core')
    implementation project(':lattice:lattice-codegen')
    implementation project(':lattice:extensions:a2a:lattice-a2a')
    implementation platform('org.a2aproject.sdk:a2a-java-sdk-reference-bom:1.0.0.CR1')
    implementation 'org.a2aproject.sdk:a2a-java-sdk-server-common'
    implementation 'org.a2aproject.sdk:a2a-java-sdk-spec'
    implementation 'com.squareup:javapoet'
    implementation platform("io.quarkus.platform:quarkus-bom:${quarkus_version}")
    implementation 'io.quarkus:quarkus-arc'
}

extraJavaModuleInfo {
    failOnMissingModuleInfo = false
}
