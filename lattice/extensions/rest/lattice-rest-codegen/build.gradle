description = "REST codegen extension for Lattice - Generates code that creates REST interfaces to Vajrams in Lattice Apps"

dependencies {
    implementation project(':lattice:extensions:rest:lattice-rest')
    implementation project(':lattice:extensions:rest:lattice-rest-api')
    implementation project(':lattice:lattice-codegen')

    implementation 'jakarta.ws.rs:jakarta.ws.rs-api'
}