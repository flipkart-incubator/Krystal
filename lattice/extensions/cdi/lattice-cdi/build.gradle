plugins {
    id 'org.kordamp.gradle.jandex' version "${kordamp_jandex_version}"
}

description = "CDI extension for Lattice - Facilitates using Jakarta CDI in Lattice Apps"

dependencies {
    api project(':lattice:lattice-core')
    api project(':vajram:extensions:cdi:vajram-cdi')
    api 'jakarta.enterprise:jakarta.enterprise.cdi-api'
}
