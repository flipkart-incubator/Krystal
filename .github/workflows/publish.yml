# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# Publish to Maven Central with GPG-signed artifacts.
# Requires secrets: CENTRAL_USERNAME, CENTRAL_TOKEN, GPG_PRIVATE_KEY, GPG_PASSPHRASE

name: Publish Package to the Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          settings-path: ${{ github.workspace }}

      - name: Set Krystal version to previous version temporarily
        run: sed -i 's/com.flipkart.krystal.currentVersion/com.flipkart.krystal.previousVersion/g' build.gradle

      - name: Partial Publish to Maven Local
        run: ./gradlew publishToMavenLocal -PunsafeCompile=true --no-build-cache #Unsafe compile temporarily needed due to a checker-framework issue
        env:
          GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.FOSS_GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}

      - name: Set Krystal version back to current version
        run: sed -i 's/com.flipkart.krystal.previousVersion/com.flipkart.krystal.currentVersion/g' build.gradle

      - name: Build and publish to Maven Central (with GPG signing)
        run: ./gradlew publishToMavenCentral -PunsafeCompile=true --no-build-cache #Unsafe compile temporarily needed due to a checker-framework issue
        env:
          GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.FOSS_GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_TOKEN }}